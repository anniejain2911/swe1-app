dist: jammy
language: python
python:
  - "3.11"

env:
  global:
    - DJANGO_SETTINGS_MODULE=mysite.settings

install:
  - pip install -r requirements.txt
  - pip install -r requirements-dev.txt

before_script:
  - python manage.py migrate

script:
  - black --check .
  - flake8 .
  - coverage run --source='.' manage.py test

after_success:
  - coveralls
